name: Scorecard supply-chain security

# OpenSSF Scorecard: rates the repo's security practices (branch protection,
# pinned deps, token permissions, dangerous workflow patterns, etc.) and posts
# findings to the Security > Code scanning tab.
on:
  branch_protection_rule:
  schedule:
    - cron: '30 3 * * 1'  # weekly, Monday 03:30 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF results
      id-token: write         # OIDC for publish_results
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results to the public OpenSSF API so the README badge works.
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
