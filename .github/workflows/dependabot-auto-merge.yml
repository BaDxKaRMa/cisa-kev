name: Dependabot auto-merge
on: pull_request_target

# Least privilege: enough to read metadata and merge, nothing more.
permissions:
  contents: write
  pull-requests: write
  checks: read

# One run per PR; a new push supersedes an in-flight wait.
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Wait for CI, then auto-merge patch and minor updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This repo can't use branch protection to gate the merge: CI auto-commits
        # refreshed KEV data by pushing directly to main, which required status
        # checks would block. So gate here instead — block on the PR's own checks
        # and merge only if they pass.
        #
        # `gh pr checks --watch` polls every status on the PR, but this very job
        # IS one of those statuses (named "dependabot") — watching would mean
        # waiting on itself, which never resolves on its own. So we poll manually
        # and explicitly exclude our own job's check from the wait/pass logic.
        run: |
          SELF_JOB="dependabot"
          for _ in $(seq 1 60); do
            CHECKS=$(gh pr checks "$PR_URL" --json name,bucket 2>/dev/null || echo '[]')
            OTHERS=$(echo "$CHECKS" | jq -c --arg self "$SELF_JOB" '[.[] | select(.name != $self)]')
            COUNT=$(echo "$OTHERS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              echo "Waiting for CI checks to register..."
              sleep 15
              continue
            fi
            FAILING=$(echo "$OTHERS" | jq '[.[] | select(.bucket == "fail" or .bucket == "cancel")] | length')
            if [ "$FAILING" -gt 0 ]; then
              echo "A check failed or was cancelled:"
              echo "$OTHERS" | jq -r '.[] | select(.bucket == "fail" or .bucket == "cancel") | .name'
              exit 1
            fi
            PENDING=$(echo "$OTHERS" | jq '[.[] | select(.bucket == "pending")] | length')
            if [ "$PENDING" -eq 0 ]; then
              echo "All checks passed:"
              echo "$OTHERS" | jq -r '.[].name'
              gh pr merge --squash --delete-branch "$PR_URL"
              exit 0
            fi
            echo "Still waiting on: $(echo "$OTHERS" | jq -r '[.[] | select(.bucket == "pending") | .name] | join(", ")')"
            sleep 30
          done
          echo "Timed out waiting for checks to complete."
          exit 1
