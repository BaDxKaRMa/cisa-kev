name: Site healthcheck

# Probes the LIVE deployed site (not the pre-deploy artifact) so real outages,
# stale deploys, or a corrupted data feed page get caught and surfaced as an
# issue. GitHub-native: no secrets, no external services.
on:
  schedule:
    - cron: '15 */6 * * *'  # every 6h, offset from the daily deploy cron
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # open/close the tracking issue

concurrency:
  group: healthcheck
  cancel-in-progress: true

env:
  SITE_URL: https://badxkarma.github.io/cisa-kev/
  DATA_URL: https://badxkarma.github.io/cisa-kev/known_exploited_vulnerabilities.json
  STALE_DAYS: "7"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Homepage returns 200
        run: |
          code=$(curl -sSL --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 30 -o /dev/null -w '%{http_code}' "$SITE_URL")
          echo "Homepage HTTP $code"
          test "$code" = "200"
      - name: Data feed is served, valid JSON, and fresh
        run: |
          curl -sSL --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$DATA_URL" -o data.json
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          data = json.load(open("data.json"))
          count = data.get("count")
          released = data.get("dateReleased")
          assert isinstance(count, int) and count > 0, f"suspicious count: {count!r}"
          assert released, "dateReleased missing"
          dt = datetime.fromisoformat(released.replace("Z", "+00:00"))
          age = (datetime.now(timezone.utc) - dt).days
          print(f"count={count} dateReleased={released} age={age}d")
          limit = int(os.environ["STALE_DAYS"])
          assert age <= limit, f"served data is {age} days old (> {limit})"
          PY
      - name: Open or update tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Automated site healthcheck failed.",
              "",
              `- When: ${new Date().toISOString()}`,
              `- Run: ${runUrl}`,
              "",
              "The live site or its data feed is unavailable, invalid, or stale.",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "site-health",
            });
            if (open.length === 0) {
              await github.rest.issues.create({
                owner, repo,
                title: "🔴 Site healthcheck failing",
                body,
                labels: ["site-health"],
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: open[0].number, body,
              });
            }
      - name: Close tracking issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: open } = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: "site-health",
            });
            for (const issue of open) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: "✅ Healthcheck passing again — auto-closing.",
              });
              await github.rest.issues.update({
                owner, repo, issue_number: issue.number, state: "closed",
              });
            }
